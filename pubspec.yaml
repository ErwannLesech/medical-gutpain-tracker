name: waky_gut
description: "WakyGut - Application de suivi médical digestif personnel"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Database (Offline-first)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2
  
  # Date & Time
  intl: ^0.20.2
  table_calendar: ^3.1.2
  
  # PDF Export
  pdf: ^3.11.0
  printing: ^5.12.0
  share_plus: ^9.0.0
  
  # Utils
  uuid: ^4.4.0
  collection: ^1.18.0
  file_picker: ^8.0.0+1
  
  # Notifications
  flutter_local_notifications: ^18.0.0
  flutter_timezone: ^3.0.1
  timezone: ^0.9.0
  
  # Haptic Feedback
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Isar Generator
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  
  # Launcher Icons
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700

  assets:
    - assets/images/
    - assets/icons/
    - assets/cats_optimized/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "AppIcons/playstore.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "AppIcons/playstore.png"
